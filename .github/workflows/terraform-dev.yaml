name: 'Terraform CI/CD Dev'

on:
  push:
  workflow_dispatch:

jobs:
  terraform-plan-dev:
    name: 'Terraform Plan Dev'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.ERITHEUS_APP_ID }}
          private-key: ${{ secrets.ERITHEUS_APP_PRIVATE_KEY }}
          owner: eritheus
          repositories: terraform-modules

      - name: Configure git auth
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Workspace Select or Create
        # This ensures the job doesn't fail if the workspace is new
        run: terraform workspace select -or-create dev

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Plan
        run: terraform plan -input=false -var-file="envs/dev.tfvars"

  terraform-apply-dev:
    name: 'Terraform Apply Dev'
    runs-on: ubuntu-latest
    needs: terraform-plan-dev  # Wait for Plan to finish
    
    # This triggers the manual approval UI in GitHub
    environment: development
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Workspace Select or Create
        # This ensures the job doesn't fail if the workspace is new
        run: terraform workspace select -or-create dev

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -var-file="envs/dev.tfvars"
