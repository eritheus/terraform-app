name: 'Terraform CI/CD Prod'

on:
  push:
  pull_request:
    branches: [ main ] # Trigger on PRs to these branches
  workflow_dispatch:

jobs:
  terraform-plan-prod:
    name: 'Terraform Plan Prod'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Workspace Select or Create
        # This ensures the job doesn't fail if the workspace is new
        run: terraform workspace select -or-create prod

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Plan
        run: terraform plan -input=false -var-file="envs/prod.tfvars"

  terraform-apply-prod:
    name: 'Terraform Apply Prod'
    runs-on: ubuntu-latest
    needs: terraform-plan-prod  # Wait for Plan to finish

    # Only run on main branch
    if: github.ref == 'refs/heads/main'

    # This triggers the manual approval UI in GitHub
    environment: production
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Workspace Select or Create
        # This ensures the job doesn't fail if the workspace is new
        run: terraform workspace select -or-create prod

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -var-file="envs/prod.tfvars"
