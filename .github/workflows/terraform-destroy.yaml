name: 'Terraform Destroy'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy (dev, prod, etc.)'
        required: true
        type: choice
        options:
          - dev
          - prod

jobs:
  terraform-destroy:
    name: 'Terraform Destroy ${{ inputs.environment }}'
    runs-on: ubuntu-latest
    
    # This triggers the manual approval UI in GitHub
    environment: ${{ inputs.environment }}
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_ENVIRONMENT: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Workspace Select
        run: terraform workspace select ${{ inputs.environment }}

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false -var-file="envs/${{ inputs.environment }}.tfvars"
