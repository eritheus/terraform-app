name: 'Terraform Destroy'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy (dev, prod, etc.)'
        required: true
        type: choice
        options:
          - dev
          - prod

jobs:
  terraform-destroy-plan:
    name: 'Terraform Destroy Plan - ${{ inputs.environment }}'
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_ENVIRONMENT: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Workspace Select
        run: terraform workspace select ${{ inputs.environment }}

      - name: Terraform Destroy Plan
        run: terraform plan -destroy -input=false -var-file="envs/${{ inputs.environment }}.tfvars" -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: tfplan
          retention-days: 1

  approval-request:
    name: 'Approval Required for ${{ inputs.environment }} Destruction'
    runs-on: ubuntu-latest
    needs: terraform-destroy-plan
    environment: approval-${{ inputs.environment }}

    steps:
      - name: Request Approval
        run: |
          Write-Output "⚠️  Approval required to destroy ${{ inputs.environment }} environment"
          Write-Output "✓ This workflow will be paused until an approver reviews this request"
        shell: pwsh

  terraform-destroy-apply:
    name: 'Terraform Destroy Apply - ${{ inputs.environment }}'
    runs-on: ubuntu-latest
    needs: approval-request

    # This triggers the manual approval UI in GitHub
    environment: ${{ inputs.environment }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_ENVIRONMENT: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Workspace Select
        run: terraform workspace select ${{ inputs.environment }}

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}

      - name: Terraform Destroy Apply
        run: terraform apply tfplan