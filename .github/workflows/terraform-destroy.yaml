name: 'Terraform Destroy'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy (dev, prod, etc.)'
        required: true
        type: choice
        options:
          - dev
          - prod
      confirmation:
        description: 'Confirm destruction of infrastructure'
        required: true
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  approval-request:
    name: 'Approval Required for ${{ inputs.environment }} Destruction'
    runs-on: ubuntu-latest
    environment: approval-${{ inputs.environment }}

    steps:
      - name: Request Approval
        run: |
          Write-Output "⚠️  Approval required to destroy ${{ inputs.environment }} environment"
          Write-Output "✓ This workflow will be paused until an approver reviews this request"
        shell: pwsh

  terraform-destroy:
    name: 'Terraform Destroy ${{ inputs.environment }}'
    runs-on: ubuntu-latest
    needs: approval-request

    # This triggers the manual approval UI in GitHub
    environment: ${{ inputs.environment }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_ENVIRONMENT: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Workspace Select
        run: terraform workspace select ${{ inputs.environment }}

      - name: Confirm Destruction
        run: |
          if ("${{ inputs.confirmation }}" -ne "true") {
            Write-Error "Destruction cancelled. Confirmation must be set to 'true'."
            exit 1
          }
          Write-Output "✓ Destruction confirmed for ${{ inputs.environment }} environment"
        shell: pwsh

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false -var-file="envs/${{ inputs.environment }}.tfvars"